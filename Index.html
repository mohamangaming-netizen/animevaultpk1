<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AnimeVaultpk</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#05050a;
    color:#fff;
}

/* Logo */

.logo{
    text-align:center;
    font-size:50px;
    font-weight:900;
    margin:20px 0;

    background:linear-gradient(90deg,#ffffff,#00ffff,#bc13fe,#ff4fd8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        filter:drop-shadow(0 0 5px #00ffff);
    }
    to{
        filter:drop-shadow(0 0 18px #bc13fe);
    }
}

/* Cart */

.cart{
    position:fixed;
    top:15px;
    right:15px;
    background:#111;
    color:white;
    border:1px solid #00ffff;
    border-radius:12px;
    padding:10px 15px;
    cursor:pointer;
    z-index:1000;
    transition:.3s;
}

.cart:hover{
    background:#00ffff;
    color:black;
}

/* Hero */

.hero{
    height:60vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-size:cover;
    background-position:center;
    animation:bgslider 18s infinite;
}

@keyframes bgslider{

0%,30%{
background-image:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
url("https://i.postimg.cc/HxR0Hdnf/images-(57).jpg");
}

33%,63%{
background-image:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
url("https://i.postimg.cc/jS0fZMn4/images-(58).jpg");
}

66%,100%{
background-image:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
url("https://i.postimg.cc/LsVjqjXq/images-(56).jpg");
}

}

/* Search */

.search-box{
    text-align:center;
    margin:25px;
}

.search-box input{
    width:90%;
    max-width:400px;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

/* Products */

.container{
    width:95%;
    margin:auto;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:20px;

    padding-bottom:50px;
}

.card{
    background:#111;
    border:1px solid #222;
    border-radius:12px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#00ffff;
}

.product-img{
    width:100%;
    height:230px;
    object-fit:contain;
    background:#111;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:10px;
    font-size:20px;
}

.card p{
    color:#ccc;
    margin-bottom:12px;
}

.price{
    font-size:22px;
    color:#00ffff;
    font-weight:bold;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00ffff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#bc13fe;
    color:white;
}

footer{
    text-align:center;
    padding:25px;
    color:#888;
}
</style>
</head>

<body>

<footer>

<script>
let cart = 0;
let items = [];

function addToCart(name, price) {
    cart++;
    items.push({
        name: name,
        price: price
    });

    document.getElementById("count").textContent = cart;

    alert(name + " added to cart!");
}

function goToWhatsApp() {

    if (items.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    let message = "🛒 AnimeVaultpk Order\n\n";

    let total = 0;

    items.forEach((item, index) => {
        message += (index + 1) + ". " + item.name + " - PKR " + item.price + "\n";
        total += item.price;
    });

    message += "\nTotal: PKR " + total;

    const phone = "923249443497";

    window.open(
        "https://wa.me/" +
        phone +
        "?text=" +
        encodeURIComponent(message),
        "_blank"
    );
}

function searchProducts() {

    let input = document
        .getElementById("search")
        .value
        .toLowerCase();

    let cards = document.querySelectorAll(".card");

    cards.forEach(function(card){

        let title = card.querySelector("h3").textContent.toLowerCase();

        if(title.includes(input)){
            card.style.display = "block";
        }else{
            card.style.display = "none";
        }

    });

}
</script>
