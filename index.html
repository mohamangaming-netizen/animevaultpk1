<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeVaultpk</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05050a;
  color:white;
}

/* ===== NEON LOGO ===== */
.logo{
  text-align:center;
  font-size:55px;
  font-weight:900;
  margin-top:20px;

  background:linear-gradient(90deg,#fff,#0ff0fc,#bc13fe,#ff4fd8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{filter:drop-shadow(0 0 5px #0ff0fc);}
  to{filter:drop-shadow(0 0 20px #bc13fe);}
}

/* HERO */
.hero{
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;

  animation:bgslider 18s infinite;
  background-size:cover;
  background-position:center;
}

@keyframes bgslider{
  0%,30%{
    background-image:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),
    url("https://i.postimg.cc/HxR0Hdnf/images-(57).jpg");
  }

  33%,63%{
    background-image:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),
    url("https://i.postimg.cc/jS0fZMn4/images-(58).jpg");
  }

  66%,100%{
    background-image:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.8)),
    url("https://i.postimg.cc/LsVjqjXq/images-(56).jpg");
  }
}

/* CART */
.cart{
  position:fixed;
  top:15px;
  right:15px;
  background:#111;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  border:1px solid #0ff0fc;
}

/* PRODUCTS */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#111;
  border-radius:12px;
  overflow:hidden;
  padding:10px;
  border:1px solid #222;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
  border-color:#0ff0fc;
}

.product-img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  background:#0ff0fc;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- CART -->
<div class="cart" onclick="goToWhatsApp()">
🛒 Cart: <span id="count">0</span>
</div>

<!-- LOGO -->
<div class="logo">AnimeVaultpk</div>

<!-- HERO -->
<div class="hero"></div>

<!-- PRODUCTS -->
<div class="container">

  <div class="card">
    <img class="product-img" src="https://i.postimg.cc/L6GPxL8C/1-3ab937ca-fbc5-40dc-8d0a-a134260f82b4.png">
    <h3>Itachi Uchiha</h3>
    <p>PKR 7000</p>
    <button onclick="addToCart('Itachi Uchiha',7000)">Add to Cart</button>
  </div>

  <div class="card">
    <img class="product-img" src="https://i.postimg.cc/7YSzQbJL/1780857167978-1.jpg">
    <h3>Gojo Satoru</h3>
    <p>PKR 4500</p>
    <button onclick="addToCart('Gojo Satoru',4500)">Add to Cart</button>
  </div>

  <div class="card">
    <img class="product-img" src="https://i.postimg.cc/5yMG56F5/1780856746265-1.jpg">
    <h3>Naruto Uzumaki</h3>
    <p>PKR 4000</p>
    <button onclick="addToCart('Naruto',4000)">Add to Cart</button>
  </div>
<div class="card">
  <img class="img" src="https://i.postimg.cc/L4rXNWYL/Screenshot-20260608-134250.jpg" alt="Minato Namikaze">

  <div class="card-body">
    <h3>Minato Namikaze</h3>
    <p>The Yellow Flash of the Leaf. A legendary Hokage collector figure.</p>

    <div class="price-row">
      <div class="price">PKR 5,500</div>
      <button class="add-btn" onclick="addToCart('Minato Namikaze',5500)">Add</button>
    </div>
    <div class="card">
‎  <img class="img" src="https://i.postimg.cc/8Cdk4zRs/file-0000000006b87208b020e909ff9354a0.png" alt="Pain the god of peace">
‎
‎  <div class="card-body">
‎    <h3>Pain</h3>
‎    <p>Pain the world shall know pain.</p>
‎
‎    <div class="price-row">
‎      <div class="price">PKR 5000</div>
‎      <button class="add-btn" onclick="addToCart('Pain ',5000)">Add</button>
‎    </div>
‎  </div>
‎</div>
  </div>
</div>
</div>

<script>
let cart = 0;
let items = [];

function addToCart(name, price){
  cart++;
  items.push(name + " - PKR " + price);
  document.getElementById("count").innerText = cart;
}

function goToWhatsApp(){
  let number = "923249443497";

  let msg = "AnimeVaultpk Order:%0A%0A";

  if(items.length === 0){
    msg += "Cart is empty";
  } else {
    for(let i=0;i<items.length;i++){
      msg += (i+1)+". "+items[i]+"%0A";
    }
  }

  window.open("https://wa.me/"+number+"?text="+msg);
}
</script>

</body>
</html>
